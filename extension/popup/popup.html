<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PromptPerfect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      width: 320px;
      min-height: 320px;
      background: #050505;
      color: #ECECEC;
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      font-size: 14px;
    }
    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .version {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 500;
      color: #71717a;
      background: #18181b;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid #27272a;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .links a {
      font-size: 12px;
      color: #4552FF;
      text-decoration: none;
      font-weight: 500;
    }
    .links a:hover {
      text-decoration: underline;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: #a1a1aa;
    }
    input, select {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0d0d0d;
      color: #ECECEC;
      font-family: inherit;
      font-size: 13px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #4552FF;
    }
    button#save {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #4552FF;
      color: white;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    button#save:hover { background: #5563FF; }
    #status {
      margin-top: 12px;
      font-size: 12px;
      min-height: 1.25em;
    }
    #status.connected { color: #22c55e; }
    #status.disconnected { color: #ef4444; }
    .hint {
      margin: 0 0 12px;
      font-size: 12px;
      color: #71717a;
      line-height: 1.45;
    }
    footer {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid #27272a;
      font-size: 11px;
      color: #71717a;
      line-height: 1.5;
    }
    footer a {
      color: #4552FF;
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
    .footer-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .footer-brand img {
      width: 22px;
      height: 22px;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="header-row">
    <h1>PromptPerfect</h1>
    <span id="ext-version" class="version" title="Extension version">…</span>
  </div>
  <div class="links">
    <a id="link-app" href="https://promptperfect.vercel.app" target="_blank" rel="noopener noreferrer">Open app</a>
    <a id="link-docs" href="https://promptperfect.vercel.app/docs" target="_blank" rel="noopener noreferrer">Docs</a>
  </div>
  <p class="hint">
    Default API URL is production. Use <code style="background:#27272a;padding:2px 6px;border-radius:4px;font-size:11px;">http://localhost:3000</code> for local dev.
  </p>
  <label for="apiUrl">API URL</label>
  <input type="text" id="apiUrl" placeholder="https://promptperfect.vercel.app" />
  <label for="mode">Mode</label>
  <select id="mode">
    <option value="better">Better</option>
    <option value="specific">Specific</option>
    <option value="cot">Chain of thought</option>
  </select>
  <label for="apiKey">API Key (optional)</label>
  <input type="password" id="apiKey" placeholder="Leave empty for default Gemini" />
  <button type="button" id="save">Save</button>
  <p id="status"></p>

  <footer>
    <div class="footer-brand">
      <img src="../icons/icon128.png" width="22" height="22" alt="" />
      <span><strong style="color:#a1a1aa;">Beagle</strong> — Prompt engineering, productized.</span>
    </div>
    <a href="https://beaglecorp.com" target="_blank" rel="noopener noreferrer">beaglecorp.com</a>
  </footer>
  <script src="popup.js"></script>
</body>
</html>
